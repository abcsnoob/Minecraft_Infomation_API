<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DEMO PAGE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; padding: 50px; background: #f4f4f9; }
    </style>
</head>
<body>

    <div id="abcsmc"></div>

    <script src="https://cdn.jsdelivr.net/gh/abcsnoob/Minecraft_Infomation_API@main/dist/abcsmc.min.js"></script>
    <script>
        // Khởi tạo thư viện
        abcsnoobmc.init({
            containerId: 'abcsmc', // ID của thẻ div bên trên
            useCache: true         // Bật bộ nhớ đệm
        });

        // Tùy chọn: Nhấn phím Enter để tìm kiếm
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('abcsmc-input');
                if (input && input.value) {
                    abcsnoobmc.render(input.value);
                }
            }
        });
    </script>
</body>
</html>
